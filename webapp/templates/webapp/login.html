{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Log in — Pulpit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Serif:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'webapp/css/webapp.css' %}">
  </head>

  <body class="login-body">
    <div class="login-card">
      <a href="/" class="login-logo-link">
        <img src="{% static 'webapp/pulpit_logo.svg' %}" alt="Pulpit" class="login-logo">
      </a>
      <h1 class="login-title">Log in</h1>

      {% if form.non_field_errors %}
      <div class="alert alert-danger py-2 px-3 mb-3 small" role="alert">
        {% for error in form.non_field_errors %}{{ error }}{% if not forloop.last %}<br>{% endif %}{% endfor %}
      </div>
      {% endif %}

      <form method="post" novalidate>
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}">

        <div class="mb-3">
          <label for="id_username" class="form-label">Username</label>
          <input type="text" name="username" id="id_username"
                 class="form-control{% if form.username.errors %} is-invalid{% endif %}"
                 autocomplete="username" autofocus
                 value="{{ form.username.value|default:'' }}">
        </div>

        <div class="mb-4">
          <label for="id_password" class="form-label">Password</label>
          <input type="password" name="password" id="id_password"
                 class="form-control{% if form.password.errors %} is-invalid{% endif %}"
                 autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn-primary w-100">Log in</button>
      </form>
    </div>
  </body>
</html>
