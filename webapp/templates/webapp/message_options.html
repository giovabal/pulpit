<div class="msg-options-row">
  <div class="dropdown">
    <button type="button"
            class="btn btn-sm {% if options_active %}btn-primary{% else %}btn-outline-secondary{% endif %} dropdown-toggle"
            data-bs-toggle="dropdown"
            data-bs-auto-close="outside"
            aria-expanded="false">
      <i class="bi bi-sliders me-1" aria-hidden="true"></i>Options
    </button>
    <div class="dropdown-menu msg-options-menu">

      <div class="msg-options-section">
        <div class="msg-options-label">Sort</div>
        <label class="msg-options-item">
          <input type="radio" name="sort" value="date_desc" class="msg-opt-input"
                 {% if sort == "date_desc" %}checked{% endif %}> Newest first
        </label>
        <label class="msg-options-item">
          <input type="radio" name="sort" value="date_asc" class="msg-opt-input"
                 {% if sort == "date_asc" %}checked{% endif %}> Oldest first
        </label>
        <label class="msg-options-item">
          <input type="radio" name="sort" value="views_desc" class="msg-opt-input"
                 {% if sort == "views_desc" %}checked{% endif %}> Most viewed
        </label>
        <label class="msg-options-item">
          <input type="radio" name="sort" value="views_asc" class="msg-opt-input"
                 {% if sort == "views_asc" %}checked{% endif %}> Least viewed
        </label>
        <label class="msg-options-item">
          <input type="radio" name="sort" value="reactions_desc" class="msg-opt-input"
                 {% if sort == "reactions_desc" %}checked{% endif %}> Most reactions
        </label>
        <label class="msg-options-item">
          <input type="radio" name="sort" value="reactions_asc" class="msg-opt-input"
                 {% if sort == "reactions_asc" %}checked{% endif %}> Fewest reactions
        </label>
      </div>

      <div class="msg-options-divider"></div>

      <div class="msg-options-section">
        <div class="msg-options-label">Date range</div>
        <label class="msg-options-item">
          <span class="msg-options-date-label">From</span>
          <input type="date" name="date_from" value="{{ date_from }}" class="msg-opt-input form-control form-control-sm">
        </label>
        <label class="msg-options-item">
          <span class="msg-options-date-label">To</span>
          <input type="date" name="date_to" value="{{ date_to }}" class="msg-opt-input form-control form-control-sm">
        </label>
      </div>

      <div class="msg-options-divider"></div>

      <div class="msg-options-section">
        <div class="msg-options-label">Content type</div>
        {% for t in all_types %}
        <label class="msg-options-item">
          <input type="checkbox" name="type" value="{{ t }}" class="msg-opt-input"
                 {% if t in selected_types %}checked{% endif %}> {{ t|capfirst }}
        </label>
        {% endfor %}
      </div>

      <div class="msg-options-divider"></div>

      <div class="msg-options-section">
        <div class="msg-options-label">Lost messages</div>
        <label class="msg-options-item">
          <input type="radio" name="lost" value="exclude" class="msg-opt-input"
                 {% if lost == "exclude" %}checked{% endif %}> Exclude
        </label>
        <label class="msg-options-item">
          <input type="radio" name="lost" value="include" class="msg-opt-input"
                 {% if lost == "include" %}checked{% endif %}> Include
        </label>
        <label class="msg-options-item">
          <input type="radio" name="lost" value="only" class="msg-opt-input"
                 {% if lost == "only" %}checked{% endif %}> Only
        </label>
      </div>

    </div>
  </div>
</div>

<script>
  (function () {
    document.querySelectorAll('.msg-opt-input').forEach(function (inp) {
      inp.addEventListener('change', function () { this.closest('form').submit(); });
    });
  })();
</script>
