{% extends "network/_table_base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-start mb-2">
  <h2 class="mb-0">Vacancy Analysis</h2>
  <a href="index.html" class="btn btn-outline-secondary btn-sm">← Back to index</a>
</div>
<p class="text-muted small mb-2" id="va-summary">Loading…</p>
<div class="mb-4">
  <label class="d-inline-flex align-items-center gap-2" for="va-only-after" style="font-size:.875rem;cursor:pointer;user-select:none">
    <input type="checkbox" id="va-only-after" checked>
    <span>Only after vacancy</span>
  </label>
</div>

<div id="va-validation" class="export-wide"></div>
<div id="va-root" class="export-wide"></div>

<style>
  .va-org-dot {
    display: inline-block;
    width: .65em;
    height: .65em;
    border-radius: 50%;
    margin-right: .3em;
    vertical-align: middle;
    flex-shrink: 0;
  }
  .va-score-cell { font-variant-numeric: tabular-nums; }
  .va-null { color: var(--bs-secondary-color, #6c757d); }
  .va-empty { color: var(--bs-secondary-color, #6c757d); font-style: italic; }
</style>

<script type="module">
import { fetchJson } from "./js/utils.js";

(function () {
  var dataDir = (typeof window.DATA_DIR !== "undefined" ? window.DATA_DIR : "data/");
  var _data = null;

  fetchJson(dataDir + "vacancy_analysis.json")
    .then(function (data) { _data = data; render(data); })
    .catch(function () {
      document.getElementById("va-summary").textContent = "Failed to load vacancy_analysis.json.";
    });

  document.getElementById("va-only-after").addEventListener("change", function () {
    if (_data) render(_data);
  });

  function onlyAfter() {
    return document.getElementById("va-only-after").checked;
  }

  function render(data) {
    var measures = data.selected_measures;
    var labels = data.measure_labels || {};
    var vacancies = data.vacancies || [];
    var filter = onlyAfter();

    var visibleCands = vacancies.reduce(function (n, v) {
      return n + (filter
        ? v.candidates.filter(function (c) { return c.first_activity_iso >= v.closure_date; }).length
        : v.candidates.length);
    }, 0);

    document.getElementById("va-summary").textContent =
      vacancies.length + " vacanc" + (vacancies.length === 1 ? "y" : "ies") +
      " · " + visibleCands + " candidate" + (visibleCands !== 1 ? "s" : "") +
      " · window: " + data.months_before + " mo before / " + data.months_after + " mo after" +
      " · measures: " + measures.map(function (m) { return labels[m] || m; }).join(", ");

    renderValidation(data, measures, labels);

    var root = document.getElementById("va-root");
    if (!vacancies.length) {
      root.innerHTML = '<p class="va-empty">No vacancies found in the database.</p>';
      return;
    }

    root.innerHTML = "";
    var acc = document.createElement("div");
    acc.className = "accordion";
    acc.id = "va-accordion";
    root.appendChild(acc);

    vacancies.forEach(function (vac, i) {
      acc.appendChild(buildItem(vac, i, measures, labels, filter));
    });

    if (typeof initSortableTables === "function") {
      initSortableTables();
    }
  }

  // Retrieval-style validation against the analyst-labelled known successors:
  // per measure, how often the successor ranked 1st / top-3 / top-5, plus MRR.
  function renderValidation(data, measures, labels) {
    var host = document.getElementById("va-validation");
    var v = data.validation;
    if (!v || !v.n_labelled) { host.innerHTML = ""; return; }
    var rows = measures.map(function (m) {
      var s = v.per_measure[m] || {};
      return "<tr><td>" + esc(labels[m] || m) + "</td>" +
        '<td class="number">' + s.hits_at_1 + "</td>" +
        '<td class="number">' + s.hits_at_3 + "</td>" +
        '<td class="number">' + s.hits_at_5 + "</td>" +
        '<td class="number">' + s.mrr.toFixed(3) + "</td></tr>";
    }).join("");
    host.innerHTML =
      '<div class="card mb-4"><div class="card-body py-2">' +
      '<h3 class="h6 mb-1">Validation against known successors</h3>' +
      '<p class="text-muted small mb-2">Over the ' + v.n_labelled + " vacanc" + (v.n_labelled === 1 ? "y" : "ies") +
      " with an analyst-labelled successor: how often each measure ranked the true successor first / in the top 3 / " +
      "in the top 5, and the mean reciprocal rank. A successor outside the candidate list counts as a miss.</p>" +
      '<div class="table-responsive"><table class="table table-sm mb-0">' +
      '<thead><tr><th scope="col">Measure</th><th class="number" scope="col">Hits@1</th>' +
      '<th class="number" scope="col">Hits@3</th><th class="number" scope="col">Hits@5</th>' +
      '<th class="number" scope="col">MRR</th></tr></thead>' +
      "<tbody>" + rows + "</tbody></table></div></div></div>";
  }

  function buildItem(vac, i, measures, labels, filter) {
    var candidates = filter
      ? vac.candidates.filter(function (c) { return c.first_activity_iso >= vac.closure_date; })
      : vac.candidates;

    var bodyId = "va-body-" + i;
    var headId = "va-head-" + i;
    var item = document.createElement("div");
    item.className = "accordion-item";

    var badge = '<span class="badge bg-secondary me-2">' + esc(vac.closure_date) + "</span>";
    var meta = '<span class="text-muted small">' +
      vac.orphaned_count + " orphaned · " +
      candidates.length + " candidate" + (candidates.length !== 1 ? "s" : "") +
      "</span>";

    item.innerHTML =
      '<h2 class="accordion-header" id="' + headId + '">' +
        '<button class="accordion-button' + (i > 0 ? " collapsed" : "") + '" type="button"' +
          ' data-bs-toggle="collapse" data-bs-target="#' + bodyId + '"' +
          ' aria-expanded="' + (i === 0 ? "true" : "false") + '" aria-controls="' + bodyId + '">' +
          '<span class="fw-semibold me-2">' + esc(vac.title) + "</span>" +
          badge + meta +
        "</button>" +
      "</h2>" +
      '<div id="' + bodyId + '" class="accordion-collapse collapse' + (i === 0 ? " show" : "") + '"' +
          ' aria-labelledby="' + headId + '">' +
        '<div class="accordion-body">' +
          (vac.note ? '<p class="text-muted small mb-3">' + esc(vac.note) + "</p>" : "") +
          successorLine(vac, measures, labels) +
          buildTable(candidates, vac, measures, labels) +
        "</div>" +
      "</div>";

    return item;
  }

  function successorLine(vac, measures, labels) {
    var succ = vac.successor;
    if (!succ) return "";
    var rankBits = measures.map(function (m) {
      var rk = succ.ranks ? succ.ranks[m] : null;
      return esc(labels[m] || m) + ": " + (rk != null ? "#" + rk : "—");
    }).join(" · ");
    var note = succ.in_candidates ? rankBits : "not among the scored candidates";
    return '<p class="text-muted small mb-3">★ Known successor: <strong>' + esc(succ.title) +
      "</strong> — rank " + note + "</p>";
  }

  function buildTable(candidates, vac, measures, labels) {
    if (!candidates.length) {
      return '<p class="va-empty">No replacement candidates found for this vacancy.</p>';
    }

    var colMin = {}, colMax = {};
    measures.forEach(function (m) {
      var vals = candidates.map(function (c) {
        return c.scores && c.scores[m] != null ? c.scores[m] : null;
      }).filter(function (v) { return v !== null; });
      colMin[m] = vals.length ? Math.min.apply(null, vals) : 0;
      colMax[m] = vals.length ? Math.max.apply(null, vals) : 0;
    });

    // Null-model calibration columns (BH-adjusted hypergeometric q of the amplifier-,
    // source- and origin-set overlaps), present when the run computed the underlying sets.
    var hasAmpQ = candidates.some(function (c) { return c.significance && c.significance.amplifiers; });
    var hasSrcQ = candidates.some(function (c) { return c.significance && c.significance.sources; });
    var hasOriginQ = candidates.some(function (c) { return c.significance && c.significance.origins; });

    function sigStars(q) {
      if (q == null) return "";
      if (q < 0.001) return " ***";
      if (q < 0.01) return " **";
      if (q < 0.05) return " *";
      return "";
    }

    function qCell(sig) {
      if (!sig) return '<td class="va-score-cell"><span class="va-null">—</span></td>';
      return '<td class="va-score-cell" data-sort-value="' + esc(String(sig.q)) + '" title="p = ' + esc(String(sig.p)) + '">' +
        esc(String(sig.q)) + sigStars(sig.q) + "</td>";
    }

    var head = "<thead><tr>" +
      '<th scope="col">Channel</th>' +
      '<th class="date" scope="col">First active</th>' +
      measures.map(function (m) {
        return '<th class="number" scope="col">' + esc(labels[m] || m) + "</th>";
      }).join("") +
      (hasAmpQ ? '<th class="number" scope="col" title="BH-adjusted hypergeometric tail probability of the amplifier-set overlap under a random-draw null">Amplifier q</th>' : "") +
      (hasSrcQ ? '<th class="number" scope="col" title="BH-adjusted hypergeometric tail probability of the source-set overlap under a random-draw null">Source q</th>' : "") +
      (hasOriginQ ? '<th class="number" scope="col" title="BH-adjusted hypergeometric tail probability of the shared pre-closure-origin overlap under a random-draw null">Origin q</th>' : "") +
      '<th class="number" scope="col">Amplifiers</th>' +
      '<th class="date" scope="col">Last forwarded</th>' +
      "</tr></thead>";

    var body = "<tbody>" +
      candidates.map(function (cand) {
        var dot = cand.org_color
          ? '<span class="va-org-dot" style="background:' + esc(cand.org_color) + '"></span>'
          : "";
        var succMark = cand.is_successor
          ? ' <span title="Analyst-labelled known successor" aria-label="known successor">★</span>'
          : "";
        var titleCell = dot + '<a href="' + esc(cand.url) + '" target="_blank" rel="noopener">' + esc(cand.title) + "</a>" + succMark;

        var scoreCells = measures.map(function (m) {
          var v = cand.scores ? cand.scores[m] : null;
          var bg = (v != null && typeof heatmapBg === "function") ? heatmapBg(v, colMin[m], colMax[m]) : "";
          var display = v != null ? v.toFixed(3) : '<span class="va-null">—</span>';
          var sortVal = v != null ? String(v) : "";
          var extra = "";
          if (m === "NEW_ADOPTERS" && cand.new_adopter_count != null) {
            extra = ' title="' + cand.new_adopter_count + ' newly adopting orphan' + (cand.new_adopter_count !== 1 ? "s" : "") + '"';
          } else if (m === "ORIGIN_OVERLAP" && cand.archive_forward_count != null) {
            extra = ' title="' + cand.archive_forward_count + ' forward' + (cand.archive_forward_count !== 1 ? "s" : "") + ' of posts authored by the vacancy"';
          }
          return '<td class="va-score-cell"' + extra +
            (bg ? ' style="' + esc(bg) + '"' : "") +
            (sortVal ? ' data-sort-value="' + esc(sortVal) + '"' : "") +
            ">" + display + "</td>";
        }).join("");

        var sig = cand.significance || {};
        return "<tr>" +
          "<td>" + titleCell + "</td>" +
          '<td data-sort-value="' + esc(cand.first_activity_iso || "") + '">' + esc(cand.first_activity || "—") + "</td>" +
          scoreCells +
          (hasAmpQ ? qCell(sig.amplifiers) : "") +
          (hasSrcQ ? qCell(sig.sources) : "") +
          (hasOriginQ ? qCell(sig.origins) : "") +
          "<td>" + (cand.amplifier_count != null ? cand.amplifier_count : "—") + "</td>" +
          '<td data-sort-value="' + esc(cand.last_forwarded_iso || "") + '">' + esc(cand.last_forwarded || "—") + "</td>" +
          "</tr>";
      }).join("") +
      "</tbody>";

    return '<div class="table-responsive">' +
      '<table class="table table-hover table-sm sortable">' +
        '<caption class="sr-only">Replacement candidates for ' + esc(vac.title) +
        ', closed ' + esc(vac.closure_date) + '.</caption>' +
        head + body + "</table>" +
      "</div>";
  }

  function esc(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }
})();
</script>
{% endblock %}
