{% extends "network/_table_base.html" %}

{% block head_extra %}
<meta name="description" content="{{ description }}">
{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-start mb-2">
  <h2 class="mb-0">Channels</h2>
  <div class="d-flex gap-2">
    <a href="community_table.html" class="btn btn-outline-secondary btn-sm"><i class="bi bi-diagram-3" aria-hidden="true"></i> Communities</a>
    <a href="network_table.html" class="btn btn-outline-secondary btn-sm"><i class="bi bi-bar-chart" aria-hidden="true"></i> Network</a>
    <a href="graph.html" class="btn btn-outline-secondary btn-sm"><i class="bi bi-map" aria-hidden="true"></i> Back to map</a>
    <a href="{{ repository_url }}/blob/main/docs/network-measures.md" target="_blank" rel="noopener noreferrer" class="btn btn-outline-secondary btn-sm"><i class="bi bi-book" aria-hidden="true"></i> Measures explained</a>
  </div>
</div>
<div id="timeline-nav" class="mb-2"></div>
<div id="channel-preamble" class="mb-3"></div>
<p class="text-muted" id="channel-count">Loading…</p>
<div class="table-responsive export-wide">
  <table class="table table-hover table-sm sortable" id="channel-table" aria-label="Channel network data">
    <caption class="sr-only">Per-channel network measures. Sort by clicking a column header.</caption>
    <thead></thead>
    <tbody></tbody>
  </table>
</div>
<script type="module" src="js/channel_table.js"></script>
{% endblock %}
