<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function () {
      try {
        var pref = localStorage.getItem("pulpit_theme") || "light";
        var dark = pref === "dark" || (pref === "auto" &&
          window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
        var theme = dark ? "dark" : "light";
        document.documentElement.dataset.theme = theme;
        document.documentElement.setAttribute("data-bs-theme", theme);
      } catch (e) {}
    })();
  </script>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
  <meta name="robots" content="{{ robots_meta }}">
  <meta name="generator" content="Pulpit">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <script>window.STRATEGY_LABELS = {{ strategy_labels_json|default:"{}"|safe }};</script>
  {% block head_extra %}{% endblock %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Serif:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/tables.css" type="text/css">
  <link rel="stylesheet" href="css/a11y.css" type="text/css">
</head>
<body>
  {% include "network/_skip_link.html" %}
  <nav class="export-topnav" aria-label="Site navigation">
    <div class="export-topnav-inner">
      <a href="index.html" class="export-topnav-brand">
        <img src="pulpit_logo.svg" alt="Pulpit">
      </a>
      <div class="theme-toggle btn-group btn-group-sm ms-auto" role="group" aria-label="Theme">
        <button type="button" class="btn btn-outline-secondary" data-theme-set="light" title="Light theme" aria-label="Light theme"><i class="bi bi-sun" aria-hidden="true"></i></button>
        <button type="button" class="btn btn-outline-secondary" data-theme-set="auto" title="Auto (follow system)" aria-label="Auto theme"><i class="bi bi-circle-half" aria-hidden="true"></i></button>
        <button type="button" class="btn btn-outline-secondary" data-theme-set="dark" title="Dark theme" aria-label="Dark theme"><i class="bi bi-moon-stars" aria-hidden="true"></i></button>
      </div>
    </div>
  </nav>
  <main id="main-content" class="export-wrap" tabindex="-1">
    {% block content %}{% endblock %}
  </main>
  {% include "network/_a11y_live.html" %}
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
  <script>
    (function () {
      var STORAGE_KEY = "pulpit_theme";
      function currentPref() { try { return localStorage.getItem(STORAGE_KEY) || "light"; } catch (e) { return "light"; } }
      function systemDark() { return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches; }
      function applyTheme(pref) {
        var dark = pref === "dark" || (pref === "auto" && systemDark());
        var theme = dark ? "dark" : "light";
        document.documentElement.dataset.theme = theme;
        document.documentElement.setAttribute("data-bs-theme", theme);
        document.querySelectorAll("[data-theme-set]").forEach(function (b) {
          b.classList.toggle("active", b.getAttribute("data-theme-set") === pref);
        });
      }
      applyTheme(currentPref());
      document.querySelectorAll("[data-theme-set]").forEach(function (b) {
        b.addEventListener("click", function () {
          var pref = b.getAttribute("data-theme-set");
          try { localStorage.setItem(STORAGE_KEY, pref); } catch (e) {}
          location.reload();
        });
      });
      if (window.matchMedia) {
        window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function () {
          if (currentPref() === "auto") applyTheme("auto");
        });
      }
    })();
  </script>
  <script src="js/a11y.js"></script>
  <script src="js/tables_sort.js"></script>
  <footer class="export-footer">
    <span class="export-footer-title">{{ title }}</span>
    <span class="export-footer-credit">
      Analyzed with
      <a href="{{ repository_url }}" target="_blank" rel="noopener noreferrer">
        <img src="pulpit_logo.svg" alt="Pulpit" class="export-footer-logo">
      </a>
      {% if app_version %}<span class="export-footer-version">v{{ app_version }}</span>{% endif %}
    </span>
  </footer>
</body>
</html>
