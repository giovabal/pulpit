<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
  <meta name="robots" content="{{ robots_meta }}">
  <meta name="generator" content="Pulpit">
  {% block head_extra %}{% endblock %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Serif:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/tables.css" type="text/css">
</head>
<body>
  <nav class="export-topnav" aria-label="Site navigation">
    <div class="export-topnav-inner">
      <a href="index.html" class="export-topnav-brand">
        <img src="pulpit_logo.svg" alt="Pulpit">
      </a>
    </div>
  </nav>
  <div class="export-wrap">
    {% block content %}{% endblock %}
  </div>
  <script src="js/tables_sort.js"></script>
  <footer class="export-footer">
    <span class="export-footer-title">{{ title }}</span>
    <span class="export-footer-credit">
      Analyzed with
      <a href="https://github.com/giovabal/pulpit" target="_blank" rel="noopener noreferrer">
        <img src="pulpit_logo.svg" alt="Pulpit" class="export-footer-logo">
      </a>
    </span>
  </footer>
</body>
</html>
