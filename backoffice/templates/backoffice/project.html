{% extends "backoffice/base.html" %}
{% load static %}

{% block bo_content %}
<div class="bo-section-header">
  <h2 class="bo-section-title">Project</h2>
</div>

<form class="bo-project-form" id="project-form" autocomplete="off">
  <div class="bo-field-group">
    <label class="bo-field-label" for="project-title">Title</label>
    <input class="bo-input bo-input--full" id="project-title" name="title" maxlength="200"
           placeholder="Project title" aria-describedby="project-title-hint">
    <span class="bo-field-hint" id="project-title-hint">Used as the title of the HTML and spreadsheet files produced by structural analysis.</span>
  </div>

  <div class="bo-field-group">
    <label class="bo-field-label" for="project-description">Description</label>
    <textarea class="bo-input bo-input--full" id="project-description" name="description" rows="6"
              placeholder="Description"></textarea>
  </div>

  <div class="bo-field-group">
    <label class="bo-field-label" for="project-criteria">Criteria</label>
    <textarea class="bo-input bo-input--full" id="project-criteria" name="criteria" rows="6"
              placeholder="Criteria"></textarea>
  </div>

  <div class="bo-field-group">
    <label class="bo-field-label" for="project-notes">Notes</label>
    <textarea class="bo-input bo-input--full" id="project-notes" name="notes" rows="6"
              placeholder="Notes"></textarea>
  </div>

  <div class="bo-project-btns">
    <button type="submit" class="bo-btn" id="project-save">Save</button>
  </div>
</form>
{% endblock bo_content %}

{% block extra_scripts %}
{{ block.super }}
<script src="{% static 'backoffice/js/crud.js' %}"></script>
<script src="{% static 'backoffice/js/project.js' %}"></script>
{% endblock extra_scripts %}
